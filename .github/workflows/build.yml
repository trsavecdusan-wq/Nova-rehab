name: Build Nova Rehab APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Prenesi kodo
        uses: actions/checkout@v4

      - name: Nastavi Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Nastavi Android SDK
        uses: android-actions/setup-android@v3

      - name: Dovoli izvajanje Gradle
        run: chmod +x gradlew

      - name: Zgradi APK
        run: ./gradlew assembleDebug

      - name: Naloži APK
        uses: actions/upload-artifact@v4
        with:
          name: NovaRehab-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
