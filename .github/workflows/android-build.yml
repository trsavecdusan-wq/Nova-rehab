name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform/build tools
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Cache Gradle download and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/rehab-wrapper
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', '**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle launcher executable
        run: chmod +x ./gradlew

      - name: Verify project structure
        run: |
          test -f settings.gradle
          test -f build.gradle
          test -f app/build.gradle
          test -f app/src/main/AndroidManifest.xml
          test -f companion/build.gradle
          test -f companion/src/main/AndroidManifest.xml

      - name: Build debug APKs
        run: ./gradlew --no-daemon clean :app:assembleDebug :companion:assembleDebug --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaRehab-debug-apks
          path: |
            app/build/outputs/apk/debug/*.apk
            companion/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Upload APKs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: novarehab-companion-latest
          name: NovaRehab Companion APKs
          make_latest: true
          overwrite_files: true
          files: |
            app/build/outputs/apk/debug/*.apk
            companion/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
