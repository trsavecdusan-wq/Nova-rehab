name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform/build tools
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Cache Gradle download and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/rehab-wrapper
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', '**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle launcher executable
        run: chmod +x ./gradlew

      - name: Verify project structure
        run: |
          test -f settings.gradle
          test -f build.gradle
          test -f app/build.gradle
          test -f app/src/main/AndroidManifest.xml
          test -f companion/build.gradle
          test -f companion/src/main/AndroidManifest.xml

      - name: Build release APK set
        run: |
          ./gradlew --no-daemon clean \
            :app:assembleDebug \
            :companion:assembleZanaDebug \
            :companion:assembleDedekDebug \
            :companion:assembleInnaDebug \
            :companion:assembleJulijaDebug \
            :companion:assembleKumaDebug \
            :companion:assembleDusanDebug \
            --stacktrace

      - name: Prepare release APKs
        run: |
          rm -rf release-apks
          mkdir -p release-apks

          cp app/build/outputs/apk/debug/app-debug.apk release-apks/app-debug.apk
          cp companion/build/outputs/apk/zana/debug/companion-zana-debug.apk release-apks/companion-zana-debug.apk
          cp companion/build/outputs/apk/dedek/debug/companion-dedek-debug.apk release-apks/companion-dedek-debug.apk
          cp companion/build/outputs/apk/inna/debug/companion-inna-debug.apk release-apks/companion-inna-debug.apk
          cp companion/build/outputs/apk/julija/debug/companion-julija-debug.apk release-apks/companion-julija-debug.apk
          cp companion/build/outputs/apk/kuma/debug/companion-kuma-debug.apk release-apks/companion-kuma-debug.apk
          cp companion/build/outputs/apk/dusan/debug/companion-dusan-debug.apk release-apks/companion-dusan-debug.apk

      - name: Verify release APKs
        run: |
          test -f release-apks/app-debug.apk
          test -f release-apks/companion-zana-debug.apk
          test -f release-apks/companion-dedek-debug.apk
          test -f release-apks/companion-inna-debug.apk
          test -f release-apks/companion-julija-debug.apk
          test -f release-apks/companion-kuma-debug.apk
          test -f release-apks/companion-dusan-debug.apk

          if [ -f release-apks/companion-debug.apk ]; then
            echo "release-apks/companion-debug.apk must not be published"
            exit 1
          fi

          apk_count=$(find release-apks -maxdepth 1 -type f -name '*.apk' | wc -l | tr -d ' ')
          if [ "$apk_count" != "7" ]; then
            echo "release-apks must contain exactly 7 APK files, found $apk_count"
            find release-apks -maxdepth 1 -type f -print
            exit 1
          fi

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaRehab-debug-apks
          path: release-apks/*.apk
          if-no-files-found: error

      - name: Remove old generic companion APK from release
        run: gh release delete-asset novarehab-companion-latest companion-debug.apk --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APKs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: novarehab-companion-latest
          name: NovaRehab Companion APKs
          make_latest: true
          overwrite_files: true
          files: release-apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
