name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Namesti Android build tools
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Daj pravice za gradlew
        run: chmod +x gradlew

      - name: Build vseh APK-jev
        run: |
          ./gradlew --no-daemon clean \
            :app:assembleDebug \
            :companion:assembleZanaDebug \
            :companion:assembleDedekDebug \
            :companion:assembleInnaDebug \
            :companion:assembleJulijaDebug \
            :companion:assembleKumaDebug \
            :companion:assembleDusanDebug \
            --stacktrace

      - name: Pripravi release APK-je
        run: |
          rm -rf release-apks
          mkdir -p release-apks

          cp app/build/outputs/apk/debug/app-debug.apk release-apks/app-debug.apk
          cp companion/build/outputs/apk/zana/debug/companion-zana-debug.apk release-apks/companion-zana-debug.apk
          cp companion/build/outputs/apk/dedek/debug/companion-dedek-debug.apk release-apks/companion-dedek-debug.apk
          cp companion/build/outputs/apk/inna/debug/companion-inna-debug.apk release-apks/companion-inna-debug.apk
          cp companion/build/outputs/apk/julija/debug/companion-julija-debug.apk release-apks/companion-julija-debug.apk
          cp companion/build/outputs/apk/kuma/debug/companion-kuma-debug.apk release-apks/companion-kuma-debug.apk
          cp companion/build/outputs/apk/dusan/debug/companion-dusan-debug.apk release-apks/companion-dusan-debug.apk

      - name: Preveri seznam release APK-jev
        run: |
          echo "APK datoteke za release:"
          find release-apks -maxdepth 1 -type f -name '*.apk' -print | sort

          test -f release-apks/app-debug.apk
          test -f release-apks/companion-zana-debug.apk
          test -f release-apks/companion-dedek-debug.apk
          test -f release-apks/companion-inna-debug.apk
          test -f release-apks/companion-julija-debug.apk
          test -f release-apks/companion-kuma-debug.apk
          test -f release-apks/companion-dusan-debug.apk

          if [ -f release-apks/companion-debug.apk ]; then
            echo "NAPAKA: release-apks/companion-debug.apk ne sme obstajati"
            exit 1
          fi

          apk_count=$(find release-apks -maxdepth 1 -type f -name '*.apk' | wc -l | tr -d ' ')
          if [ "$apk_count" != "7" ]; then
            echo "NAPAKA: release-apks mora imeti točno 7 APK datotek, našel sem $apk_count"
            find release-apks -maxdepth 1 -type f -print
            exit 1
          fi

      - name: Preveri package name companion APK-jev
        run: |
          AAPT="$ANDROID_HOME/build-tools/34.0.0/aapt"
          if [ ! -x "$AAPT" ]; then
            AAPT=$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort | tail -n 1)
          fi

          if [ ! -x "$AAPT" ]; then
            echo "NAPAKA: aapt ni bil najden"
            exit 1
          fi

          check_package() {
            apk="$1"
            expected="$2"
            actual=$("$AAPT" dump badging "$apk" | sed -n "s/package: name='\([^']*\)'.*/\1/p" | head -n 1)
            echo "$apk -> $actual"
            if [ "$actual" != "$expected" ]; then
              echo "NAPAKA: napačen package za $apk"
              echo "Pričakovano: $expected"
              echo "Dejansko:    $actual"
              exit 1
            fi
          }

          check_package release-apks/companion-zana-debug.apk com.novarehab.companion.zana
          check_package release-apks/companion-dedek-debug.apk com.novarehab.companion.dedek
          check_package release-apks/companion-inna-debug.apk com.novarehab.companion.inna
          check_package release-apks/companion-julija-debug.apk com.novarehab.companion.julija
          check_package release-apks/companion-kuma-debug.apk com.novarehab.companion.kuma
          check_package release-apks/companion-dusan-debug.apk com.novarehab.companion.dusan

      - name: Naloži debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaRehab-debug-apks
          path: release-apks/*.apk
          if-no-files-found: error

      - name: Odstrani star napačen companion-debug.apk iz release
        run: gh release delete-asset novarehab-companion-latest companion-debug.apk --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ustvari ali posodobi release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: novarehab-companion-latest
          name: NovaRehab Companion APKs
          draft: false
          prerelease: false
          make_latest: true
          overwrite_files: true
          files: release-apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
