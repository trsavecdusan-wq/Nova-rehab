name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Namesti Android build tools
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Daj pravice za gradlew
        run: chmod +x gradlew

      - name: Build vseh APK-jev
        run: |
          ./gradlew --no-daemon clean \
            :app:assembleDebug \
            :companion:assembleDebug \
            --stacktrace

      - name: Pripravi APK output
        run: |
          rm -rf output
          mkdir -p output

          cp app/build/outputs/apk/debug/app-debug.apk output/app-debug.apk
          cp companion/build/outputs/apk/debug/companion-debug.apk output/companion-debug.apk

      - name: Ustvari app-version.json
        run: |
          cat > app-version.json <<'EOF'
          {
            "versionCode": 10,
            "versionName": "1.0.10",
            "apkUrl": "https://github.com/trsavecdusan-wq/Nova-rehab/releases/download/novarehab-companion-latest/app-debug.apk",
            "companionApkUrl": "https://github.com/trsavecdusan-wq/Nova-rehab/releases/download/novarehab-companion-latest/companion-debug.apk",
            "message": "Nova verzija aplikacije NovaRehab je na voljo."
          }
          EOF

      - name: Preveri seznam APK-jev
        run: |
          echo "APK datoteke za release:"
          find output -maxdepth 1 -type f -name '*.apk' -print | sort

          test -f output/app-debug.apk
          test -f output/companion-debug.apk
          test -f app-version.json

          apk_count=$(find output -maxdepth 1 -type f -name '*.apk' | wc -l | tr -d ' ')
          if [ "$apk_count" != "2" ]; then
            echo "NAPAKA: output mora imeti tocno 2 APK datoteki, nasel sem $apk_count"
            find output -maxdepth 1 -type f -print
            exit 1
          fi

      - name: Preveri package name companion APK-ja
        run: |
          AAPT="$ANDROID_HOME/build-tools/34.0.0/aapt"
          if [ ! -x "$AAPT" ]; then
            AAPT=$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort | tail -n 1)
          fi

          if [ ! -x "$AAPT" ]; then
            echo "NAPAKA: aapt ni bil najden"
            exit 1
          fi

          check_package() {
            apk="$1"
            expected="$2"
            actual=$("$AAPT" dump badging "$apk" | sed -n "s/package: name='\([^']*\)'.*/\1/p" | head -n 1)
            echo "$apk -> $actual"
            if [ "$actual" != "$expected" ]; then
              echo "NAPAKA: napacen package za $apk"
              echo "Pricakovano: $expected"
              echo "Dejansko:    $actual"
              exit 1
            fi
          }

          check_package output/companion-debug.apk com.novarehab.companion

      - name: Nalozi debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaRehab-debug-apks
          path: |
            output/*.apk
            app-version.json
          if-no-files-found: error

      - name: Odstrani stare companion APK-je iz release
        run: |
          gh release delete-asset novarehab-companion-latest companion-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-contact1-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-contact2-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-contact3-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-contact4-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-contact5-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-contact6-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-zana-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-dedek-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-inna-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-julija-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-kuma-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-dusan-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-c01-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-c02-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-c03-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-c04-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-c05-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-c06-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-01-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-02-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-03-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-04-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-05-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest companion-06-debug.apk --yes || true
          gh release delete-asset novarehab-companion-latest update-01.json --yes || true
          gh release delete-asset novarehab-companion-latest update-02.json --yes || true
          gh release delete-asset novarehab-companion-latest update-03.json --yes || true
          gh release delete-asset novarehab-companion-latest update-04.json --yes || true
          gh release delete-asset novarehab-companion-latest update-05.json --yes || true
          gh release delete-asset novarehab-companion-latest update-06.json --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ustvari ali posodobi release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: novarehab-companion-latest
          name: NovaRehab Companion APKs
          draft: false
          prerelease: false
          make_latest: true
          overwrite_files: true
          files: |
            output/*.apk
            app-version.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


