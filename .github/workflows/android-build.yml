name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Daj pravice za gradlew
        run: chmod +x gradlew

      - name: Build main app APK
        run: ./gradlew :app:assembleDebug

      - name: Build companion APK-jev
        run: |
          ./gradlew :companion:assembleZanaDebug
          ./gradlew :companion:assembleDedekDebug
          ./gradlew :companion:assembleInnaDebug
          ./gradlew :companion:assembleJulijaDebug
          ./gradlew :companion:assembleKumaDebug
          ./gradlew :companion:assembleDusanDebug

      - name: Pripravi APK output
        run: |
          mkdir output

          cp app/build/outputs/apk/debug/app-debug.apk output/

          cp companion/build/outputs/apk/zana/debug/*.apk output/ || true
          cp companion/build/outputs/apk/dedek/debug/*.apk output/ || true
          cp companion/build/outputs/apk/inna/debug/*.apk output/ || true
          cp companion/build/outputs/apk/julija/debug/*.apk output/ || true
          cp companion/build/outputs/apk/kuma/debug/*.apk output/ || true
          cp companion/build/outputs/apk/dusan/debug/*.apk output/ || true

      - name: Preveri APK-je
        run: |
          cd output
          ls -la

      - name: Ustvari ali posodobi release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: novarehab-companion-latest
          name: NovaRehab Companion Latest
          draft: false
          prerelease: false
          files: output/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
