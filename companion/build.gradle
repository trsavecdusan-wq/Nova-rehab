plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.novarehab.companion'
    compileSdk 34

    defaultConfig {
        applicationId "com.novarehab.companion"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        // TODO: Before real use, configure release signing keystore.
        // Same signing key is required for future upgrades.
    }

    buildFeatures {
        buildConfig true
    }

    flavorDimensions "contact"

    productFlavors {
        zana {
            dimension "contact"
            applicationId "com.novarehab.companion.zana"
            resValue "string", "app_name", "Companion Zana"
            buildConfigField "String", "CONTACT_ID", "\"zana\""
            buildConfigField "String", "CONTACT_NAME", "\"Žana\""
            buildConfigField "String", "ROOM_ID", "\"lana-zana\""
            buildConfigField "String", "PREFERRED_LANGUAGE_CODE", "\"sl\""
            buildConfigField "String", "UPDATE_CHECK_URL", "\"https://github.com/trsavecdusan-wq/Nova-rehab/releases/download/novarehab-companion-latest/update-zana.json\""
            buildConfigField "String", "APK_DOWNLOAD_URL", "\"https://github.com/trsavecdusan-wq/Nova-rehab/releases/download/novarehab-companion-latest/companion-zana-debug.apk\""
        }

        dedek {
            dimension "contact"
            applicationId "com.novarehab.companion.dedek"
            resValue "string", "app_name", "Companion Dedek"
            buildConfigField "String", "CONTACT_ID", "\"dedek\""
            buildConfigField "String", "CONTACT_NAME", "\"Dedek\""
            buildConfigField "String", "ROOM_ID", "\"lana-dedek\""
            buildConfigField "String", "PREFERRED_LANGUAGE_CODE", "\"sl\""
            buildConfigField "String", "UPDATE_CHECK_URL", "\"https://github.com/trsavecdusan-wq/Nova-rehab/releases/download/novarehab-companion-latest/update-dedek.json\""
            buildConfigField "String", "APK_DOWNLOAD_URL", "\"https://github.com/trsavecdusan-wq/Nova-rehab/releases/download/novarehab-companion-latest/companion-dedek-debug.apk\""
        }

        inna {
            dimension "contact"
            applicationId "com.novarehab.companion.inna"
            resValue "string", "app_name", "Companion Inna"
            buildConfigField "String", "CONTACT_ID", "\"inna\""
            buildConfigField "String", "CONTACT_NAME", "\"Inna\""
            buildConfigField "String", "ROOM_ID", "\"lana-inna\""
            buildConfigField "String", "PREFERRED_LANGUAGE_CODE", "\"uk\""
            buildConfigField "String", "UPDATE_CHECK_URL", "\"https://github.com/trsavecdusan-wq/Nova-rehab/releases/download/novarehab-companion-latest/update-inna.json\""
            buildConfigField "String", "APK_DOWNLOAD_URL", "\"https://github.com/trsavecdusan-wq/Nova-rehab/releases/download/novarehab-companion-latest/companion-inna-debug.apk\""
