plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.novarehab.companion'
    compileSdk 34

    defaultConfig {
        applicationId "com.novarehab.companion"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

tasks.register("copyNamedCompanionDebugApks") {
    dependsOn("assembleDebug")

    doLast {
        def sourceApk = file("$buildDir/outputs/apk/debug/companion-debug.apk")
        def outputDir = file("$buildDir/outputs/apk/contacts/debug")
        def contactIds = ["zana", "dedek", "inna", "julija", "kuma", "dusan"]

        if (!sourceApk.exists()) {
            throw new GradleException("Companion debug APK was not created: ${sourceApk}")
        }

        outputDir.mkdirs()

        contactIds.each { contactId ->
            copy {
                from sourceApk
                into outputDir
                rename { "companion-${contactId}-debug.apk" }
            }
        }
    }
}
